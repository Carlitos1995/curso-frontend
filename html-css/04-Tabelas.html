<!DOCTYPE html>
<html lang="pt_br">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> Tabelas</title>
</head>
<body>
	<h1>Tabelas</h1>

	<table border="1" width="100%">
		<thead>
			<tr>
			    <th>Coluna 1</th>
			    <th>Coluna 2</th>
			    <th>Coluna 3</th>
			</tr>
			

		</thead>
		<tbody align="center">
		<tr>
			<td>1A</td>
			<td>1B</td>
			<td>1C</td>
		</tr>
		<tr>
			<td>2A</td>
			<td>2B</td>
			<td>2C</td>
		</tr>
		<tr>
			<td>3A</td>
			<td colspan="2">3BC</td>
			
		</tr>
	    </tbody>

	    <tr>
	    	<tr>
	    		<td colspan="3">Rodapé da tabela</td>
	    	</tr>
	    </tr>
	</table>

	<h2>Tabela com layout</h2>

	<table width="600">
		<tr height="90">
			<td colspan="4" bgcolor="#BBCCEE" align="center"> Cabeçalho</td>
		</tr>
		<tr height="300">
			<td width="20" bgcolor="#0000FF"></td>
			<td width="60%" bgcolor="#DDDDDD">
				<h2>Título</h2>
				<p>Carlos Neto</p>
			Coluna 1</td>
			<td bgcolor="#EEEEEE">Coluna 2</td>
			<td width="20" bgcolor="#0000FF"></td>
		</tr>
		<tr>
			<td bgcolor="#FF0000" colspan="4" align="center">Rodapé</td>
			
		</tr>
	</table>

</body>
</html>
